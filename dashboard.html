<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - GitHub Issues Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    </style>
</head>
<body class="bg-[#F8FAFC]">

    <nav class="bg-white border-b border-slate-100 p-5 sticky top-0 z-40">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <img src="assets/github-logo.png" alt="Logo" class="w-8 h-8 rounded-lg object-contain">
                <h2 class="font-extrabold text-xl text-slate-800 tracking-tight">GitHub Issues Tracker</h2>
            </div>
            <div class="flex gap-2 sm:gap-3">
                <div class="relative">
                    <input id="searchInput" class="bg-slate-50 border border-slate-200 pl-10 pr-4 py-2.5 rounded-xl text-sm focus:ring-2 focus:ring-indigo-500 outline-none w-40 sm:w-72 transition-all">
                    <svg class="w-4 h-4 absolute left-3.5 top-3.5 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
                </div>
                <button onclick="searchIssue()" class="bg-indigo-600 text-white px-6 py-2.5 rounded-xl text-sm font-bold hover:bg-indigo-700 transition-all active:scale-95">Search</button>
            </div>
        </div>
    </nav>

    <div class="max-w-7xl mx-auto p-8">
        <div class="flex gap-3 mb-10">
            <button id="btn-all" onclick="changeTab('all', this)" class="tab bg-[#4F46E5] text-white px-10 py-2.5 rounded-xl font-bold shadow-lg shadow-indigo-100 transition-all">All</button>
            <button id="btn-open" onclick="changeTab('open', this)" class="tab bg-white text-slate-500 border border-slate-200 px-10 py-2.5 rounded-xl font-bold hover:bg-slate-50 transition-all">Open</button>
            <button id="btn-closed" onclick="changeTab('closed', this)" class="tab bg-white text-slate-500 border border-slate-200 px-10 py-2.5 rounded-xl font-bold hover:bg-slate-50 transition-all">Closed</button>
        </div>

        <div class="flex justify-between items-center mb-10 bg-white p-8 rounded-[24px] border border-slate-100 shadow-sm">
            <div class="flex items-center gap-5">
                <div class="p-1 bg-indigo-50 rounded-2xl border border-indigo-100 shadow-sm">
                    <img src="assets/Aperture.png" alt="Icon" class="w-12 h-12 object-contain rounded-xl">
                </div>
                <div>
                    <h3 id="issueCount" class="font-extrabold text-2xl text-slate-800">0 Issues</h3>
                    <p class="text-slate-400 font-medium italic">Track and manage your project issues</p>
                </div>
            </div>
            <div class="flex gap-10 font-bold text-slate-600">
                <div class="flex items-center gap-2.5"><span class="w-3.5 h-3.5 bg-[#10B981] rounded-full ring-4 ring-emerald-50"></span> Open</div>
                <div class="flex items-center gap-2.5"><span class="w-3.5 h-3.5 bg-[#8B5CF6] rounded-full ring-4 ring-purple-50"></span> Closed</div>
            </div>
        </div>

        <div id="issuesContainer" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6"></div>
    </div>

    <div id="modal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm hidden flex items-center justify-center z-50 p-4">
        <div id="modalContainer" class="bg-white rounded-[40px] w-full max-w-2xl shadow-2xl relative overflow-hidden animate-in fade-in zoom-in duration-300">
            <div id="modalContent" class="p-12"></div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
