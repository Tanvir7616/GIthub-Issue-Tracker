<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GitHub Issues Tracker</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
body{font-family:'Inter',sans-serif;}
</style>

</head>

<body class="bg-gray-100 flex items-center justify-center h-screen">

<div class="bg-white w-full max-w-md p-10 rounded-3xl shadow-xl">

<div class="flex justify-center mb-4">
<div class="bg-gray-800 w-16 h-16 flex items-center justify-center rounded-full">
<img src="assets/github-logo.png" class="w-8">
</div>
</div>

<h1 class="text-2xl font-bold text-center">GitHub Issues Tracker</h1>
<p class="text-center text-gray-500 mb-8">Sign in to manage your issues</p>

<label class="font-medium">Username</label>
<input id="username" type="text" placeholder="Enter Username"
class="w-full border rounded-lg p-3 mt-2 mb-1 focus:outline-none focus:ring-2 focus:ring-indigo-500">

<p class="text-indigo-600 text-sm mb-4">Default: admin</p>

<label class="font-medium">Password</label>
<input id="password" type="password" placeholder="Enter Password"
class="w-full border rounded-lg p-3 mt-2 mb-1 focus:outline-none focus:ring-2 focus:ring-indigo-500">

<p class="text-indigo-600 text-sm mb-4">Default: admin123</p>

<button onclick="login()"
class="w-full py-3 rounded-lg text-white font-semibold bg-gradient-to-r from-purple-600 to-indigo-600 hover:opacity-90">
Sign In
</button>

<div class="flex items-center my-6">
<div class="flex-grow border-t"></div>
<span class="mx-4 text-gray-400">OR</span>
<div class="flex-grow border-t"></div>
</div>

<div class="bg-gray-100 p-4 rounded-lg text-center">
<p class="text-gray-500 mb-2">Demo Credentials:</p>
<p><strong>Username:</strong> admin</p>
<p><strong>Password:</strong> admin123</p>
</div>

</div>

<script src="app.js"></script>

</body>
</html>
