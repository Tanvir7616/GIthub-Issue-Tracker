<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - GitHub Issues Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-slate-50 flex items-center justify-center h-screen p-4">
    <div class="bg-white p-10 rounded-[32px] shadow-2xl shadow-indigo-100 w-full max-w-md border border-slate-100">
        <div class="flex justify-center mb-6">
            <img src="assets/github-logo.png" alt="GitHub Logo" class="w-16 h-16 object-contain rounded-2xl shadow-md">
        </div>
        
        <h1 class="text-2xl font-bold text-center text-slate-800 mb-1">GitHub Issues Tracker</h1>
        <p class="text-center text-slate-400 mb-8 text-sm font-medium">Track and manage project issues</p>

        <div class="space-y-4">
            <input id="username" class="w-full bg-slate-50 border border-slate-200 p-4 rounded-2xl focus:ring-2 focus:ring-indigo-500 outline-none transition-all font-medium" placeholder="Username">
            <input id="password" type="password" class="w-full bg-slate-50 border border-slate-200 p-4 rounded-2xl focus:ring-2 focus:ring-indigo-500 outline-none transition-all font-medium" placeholder="Password">
            <button onclick="login()" class="w-full bg-[#4F46E5] hover:bg-indigo-700 text-white font-bold p-4 rounded-2xl transition-all shadow-lg shadow-indigo-200 active:scale-[0.98]">
                Sign In
            </button>
        </div>
        <p class="text-[11px] text-center mt-6 text-slate-400 font-bold uppercase tracking-widest">Demo: admin / admin123</p>
    </div>
    <script src="app.js"></script>
</body>
</html>
